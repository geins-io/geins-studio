name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GEINS_API_URL=${{ secrets.GEINS_API_URL }}
            GIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-studio-prod
          template: infra/main.bicep
          parameters: >-
            infra/parameters/prod.bicepparam
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
            ghcrUsername=${{ github.actor }}
            ghcrToken=${{ secrets.GHCR_PAT }}
            authSecret=${{ secrets.AUTH_SECRET }}
            geinsApiUrl=${{ secrets.GEINS_API_URL }}
            baseUrl=${{ vars.BASE_URL }}
            authPath=${{ vars.AUTH_PATH }}
            geinsDebug=${{ vars.GEINS_DEBUG || 'false' }}
            salesPortalWebhookSecret=${{ secrets.SALES_PORTAL_WEBHOOK_SECRET }}
            logLevel=${{ vars.LOG_LEVEL || 'warn' }}
          deploymentName: deploy-${{ github.sha }}

  swap:
    name: Swap to Production
    needs: deploy
    runs-on: ubuntu-latest
    environment: prod-swap
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging slot to production
        run: |
          az webapp deployment slot swap \
            --resource-group rg-studio-prod \
            --name studio-prod-app \
            --slot staging \
            --target-slot production
